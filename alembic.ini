# alembic.ini
# ---------------------------------------------------------------------------
# Alembic configuration for the AI-Powered Automotive & Insurance MIP.
# ---------------------------------------------------------------------------

[alembic]
# Path to migration scripts directory (relative to this file)
script_location = database/migrations

# Jinja2 template file for new revision scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with cwd so that "database.*" imports resolve
prepend_sys_path = .

# Truncate SQL emitted in --sql mode at N chars (0 = no limit)
truncate_remarks_at = 0

# ---------------------------------------------------------------------------
# Database URL
# ---------------------------------------------------------------------------
# Do NOT hard-code credentials here.
# env.py reads DATABASE_URL from the environment; this value is only used
# when running `alembic` outside of the application (e.g., in CI).
# Override via:  export DATABASE_URL="postgresql+psycopg2://user:pass@host/db"
sqlalchemy.url = postgresql+psycopg2://postgres:conservatoire@localhost:5432/automotive_intelligence


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
