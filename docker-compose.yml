services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: automotive_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teamwill2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: automotive_intelligence
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-teamwill2026}
      DATABASE_URL: postgresql+psycopg2://postgres:${DB_PASSWORD:-teamwill2026}@db:5432/automotive_intelligence
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    command: >
      sh -c "
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Seeding data...' &&
        python scripts/seed_realistic_data.py &&
        python scripts/seed_tunisia_data.py &&
        python scripts/seed_tunisia_brands.py &&
        python scripts/seed_global_brands.py &&
        echo 'Running NLP pipeline...' &&
        python scripts/run_nlp_pipeline.py &&
        echo 'Running opportunity scorer...' &&
        python scripts/run_opportunity_scorer.py &&
        echo 'Starting API...' &&
        uvicorn api.main:app --host 0.0.0.0 --port 8000
      "

  dashboard:
    build:
      context: dashboard
      dockerfile: Dockerfile.dashboard
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
