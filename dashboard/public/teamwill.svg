<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="5" y="5" width="90" height="90" rx="15" fill="#0A0F1E" stroke="#FFF" stroke-width="4" />
  <clipPath id="circle-clip">
    <circle cx="50" cy="50" r="32" />
  </clipPath>
  
  <g clip-path="url(#circle-clip)">
    <!-- Horizontal lines -->
    <rect x="10" y="25" width="80" height="4" fill="#FFF" />
    <rect x="10" y="35" width="80" height="4" fill="#FFF" />
    <rect x="10" y="45" width="80" height="4" fill="#FFF" />
    <rect x="10" y="55" width="80" height="4" fill="#FFF" />
    <rect x="10" y="65" width="80" height="4" fill="#FFF" />
    <rect x="10" y="75" width="80" height="4" fill="#FFF" />
    
    <!-- Central thick T -->
    <rect x="25" y="35" width="50" height="12" fill="#FFF" />
    <rect x="44" y="35" width="12" height="40" fill="#FFF" />
  </g>
</svg>
